<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>brx' Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* --- PÁGINA TOTALMENTE ESTÁTICA Y ANCLADA --- */
        body { 
            background-color: #000; 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
            position: fixed; 
            width: 100%;
            overscroll-behavior: none; 
        }

        /* --- CONTENEDOR DE EFECTOS (PUNTOS Y SÍMBOLOS) --- */
        #sparkle-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        
        /* Modificado para soportar texto y círculos sin romperse */
        .sparkle { 
            position: absolute; 
            opacity: 0; 
            animation: twinkle 0.8s infinite ease-in-out; 
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        } 
        
        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1.6); }
        }

        .container { z-index: 2; width: 90%; max-width: 350px; text-align: center; }
        
        /* Avatar con aro rojo fino */
        .avatar { 
            width: 130px; 
            height: 130px; 
            border-radius: 50%; 
            border: 1.5px solid #ff0000; 
            box-shadow: 0 0 0 3px #000000, 0 0 20px rgba(255, 0, 0, 0.8); 
            margin-bottom: 20px; 
            object-fit: cover; 
        }
        
        h1 { font-size: 32px; letter-spacing: 4px; margin-bottom: 6px; color: #fff; text-shadow: 0 0 15px #ff0000; }
        .subtitle { font-size: 13px; color: #888; letter-spacing: 1px; margin-bottom: 35px; font-style: italic; }

        .links-container { display: flex; flex-direction: column; gap: 15px; align-items: center; } 
        
        .btn { 
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center; 
            width: 100%;
            padding: 15px 20px; 
            border: 1px solid #333; 
            border-radius: 8px; 
            color: #ccc; 
            text-decoration: none; 
            font-size: 14px; 
            font-weight: bold; 
            background: rgba(255,255,255,0.02); 
            transition: all 0.2s ease; 
        }

        .btn-icon { position: absolute; left: 24px; font-size: 16px; width: 20px; transition: color 0.2s ease; }

        .btn:hover { border-color: #ff0000; color: #fff; box-shadow: 0 0 15px rgba(255,0,0,0.5); background: rgba(255, 0, 0, 0.1); }

        .btn:active { 
            transform: scale(0.95); 
            background: #ff0000; 
            color: #000; 
            box-shadow: 0 0 25px #ff0000, 0 0 10px #ff0000; 
            border-color: #fff;
        }

        /* --- BOTÓN CIRCULAR MÚSICA --- */
        .music-circle {
            width: 55px; height: 55px; border-radius: 50%;
            border: 1.5px solid #ff0000;
            background: rgba(255, 0, 0, 0.1);
            color: #ff0000;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; margin-top: 10px; 
            transition: all 0.2s ease;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }

        .music-circle:hover { background: rgba(255, 0, 0, 0.3); box-shadow: 0 0 20px #ff0000; }

        .music-circle:active {
            transform: scale(0.90);
            background: #ff0000; color: #000;
            box-shadow: 0 0 30px #ff0000, 0 0 10px #ffffff;
            border-color: #fff;
        }
    </style>
</head>
<body>

    <audio id="bg-music" src="juniorh.mp3" loop></audio>
    <div id="sparkle-container"></div>

    <div class="container">
        <img src="perfil.png" alt="brx'" class="avatar">
        <h1>brx'</h1>
        <p class="subtitle">simplemente soy brx'</p>
        
        <div class="links-container">
            <a href="https://www.instagram.com/brx057?igsh=aWEwOGE5dHdpbDd4" class="btn"><i class="fa-brands fa-instagram btn-icon"></i>INSTAGRAM</a>
            <a href="https://discord.com/users/1400628556589043804" class="btn"><i class="fa-brands fa-discord btn-icon"></i>DISCORD</a>
            <a href="https://www.tiktok.com/@brx_057?_r=1&_t=ZS-97GHrTpFiZJ" class="btn"><i class="fa-brands fa-tiktok btn-icon"></i>TIKTOK</a>
            <a href="https://wa.me/524433799879" class="btn"><i class="fa-brands fa-whatsapp btn-icon"></i>WHATSAPP</a>
            <a href="https://t.me/exploitzero" class="btn"><i class="fa-brands fa-telegram btn-icon"></i>TELEGRAM</a>

            <div id="music-btn" class="music-circle">
                <i id="music-icon" class="fa-solid fa-play"></i>
            </div>
        </div>
    </div>

    <script>
        const audio = document.getElementById('bg-music');
        const musicBtn = document.getElementById('music-btn');
        const musicIcon = document.getElementById('music-icon');

        musicBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                musicIcon.className = "fa-solid fa-pause";
            } else {
                audio.pause();
                musicIcon.className = "fa-solid fa-play";
            }
        });

        // --- SISTEMA MIXTO DE BRILLOS Y SÍMBOLOS ROJOS ---
        function createSparkle() {
            const container = document.getElementById('sparkle-container');
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            
            sparkle.style.left = Math.random() * 100 + '%';
            sparkle.style.top = Math.random() * 100 + '%';
            
            // Paleta exclusiva de rojos intensos
            const redIntense = ['#FF0000', '#D40000', '#FF0033', '#B30000', '#FF1A1A'];
            const randomColor = redIntense[Math.floor(Math.random() * redIntense.length)];
            
            // Lista de elementos (puntos normales + tus símbolos personalizados)
            const assets = ['dot', '☣', '𓂀', '𖤐'];
            const chosen = assets[Math.floor(Math.random() * assets.length)];
            
            if (chosen === 'dot') {
                // Configuración si sale un punto brillante normal
                const size = Math.random() * 6 + 3;
                sparkle.style.width = size + 'px';
                sparkle.style.height = size + 'px';
                sparkle.style.borderRadius = '50%';
                sparkle.style.backgroundColor = randomColor;
                sparkle.style.boxShadow = `0 0 15px ${randomColor}, 0 0 8px #FF0000`;
            } else {
                // Configuración si sale uno de tus símbolos personalizados
                sparkle.innerText = chosen;
                sparkle.style.fontSize = (Math.random() * 10 + 14) + 'px'; // Tamaños variados e impactantes
                sparkle.style.color = randomColor;
                sparkle.style.textShadow = `0 0 15px ${randomColor}, 0 0 8px #FF0000`;
                sparkle.style.fontWeight = 'bold';
            }
            
            container.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 800);
        }
        
        // Spawn masivo ultra rápido cada 50 milisegundos
        setInterval(createSparkle, 50);
    </script>
</body>
</html>
