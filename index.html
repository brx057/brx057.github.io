<html lang="es">
<head>

    <style>
        /* --- SEGURIDAD Y RESETEO --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            background-color: #020205; 
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        /* --- FONDO Y PARTÍCULAS --- */
        .water-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            background: radial-gradient(circle at center, rgba(0, 90, 200, 0.15) 0%, #020205 70%);
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Para no bloquear los clics */
            z-index: 0;
        }

        /* --- SÍMBOLOS --- */
        .symbols-layer {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            animation: rotateWave 40s linear infinite;
            pointer-events: none;
        }
        .symbols-layer.reverse {
            animation: rotateWave 30s linear infinite reverse;
        }
        .sym {
            position: absolute;
            color: rgba(0, 119, 255, 0.25);
            font-size: 24px;
            text-shadow: 0 0 12px rgba(0, 119, 255, 0.9);
            animation: pulseSym 4s infinite alternate;
        }
        @keyframes rotateWave {
            0% { transform: translateX(-50%) rotate(0deg); }
            100% { transform: translateX(-50%) rotate(360deg); }
        }
        @keyframes pulseSym {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* --- CONTENEDOR DE PERFIL --- */
        .profile-container {
            position: relative;
            margin-bottom: 2vh; 
            display: flex;
            justify-content: center;
            align-items: center;
            width: 140px;
            height: 140px;
            z-index: 2;
        }

        .profile-container::before,
        .profile-container::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(0, 119, 255, 0.8);
            border-radius: 50%;
            z-index: 0;
            box-shadow: 0 0 15px rgba(0, 119, 255, 0.5);
        }

        .profile-container::before { animation: expandRing 3s infinite ease-out; }
        .profile-container::after { animation: expandRing 3s infinite ease-out 1.5s; }

        @keyframes expandRing {
            0% { width: 120px; height: 120px; opacity: 1; border-width: 3px; }
            100% { width: 220px; height: 220px; opacity: 0; border-width: 1px; }
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            z-index: 2; 
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 0 25px rgba(0, 119, 255, 0.8);
            background-color: #000;
            pointer-events: none; 
        }

        /* --- TYPEWRITER & GLITCH PARA EL TÍTULO --- */
        h1 {
            font-family: 'Georgia', serif;
            font-size: 26px;
            letter-spacing: 4px;
            margin-bottom: 4vh; 
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(0, 119, 255, 0.9);
            z-index: 2;
            
            /* Typewriter properties */
            display: inline-block;
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid rgba(0, 119, 255, 0.8);
            width: 4ch; /* Número exacto de letras "BRX'" */
            animation: typing 1.5s steps(4, end), blink .75s step-end infinite, glitch 5s infinite 3s;
        }

        @keyframes typing { from { width: 0 } to { width: 4ch } }
        @keyframes blink { 50% { border-color: transparent } }
        @keyframes glitch {
            0%, 96%, 100% { transform: none; text-shadow: 0 0 15px rgba(0, 119, 255, 0.9); }
            97% { transform: skewX(10deg) translate(-2px); text-shadow: -2px 0 red, 2px 0 cyan; }
            98% { transform: skewX(-10deg) translate(2px); text-shadow: 2px 0 red, -2px 0 cyan; }
            99% { transform: none; filter: blur(1px); }
        }

        /* --- BOTONES CON HOVER LUMINOSO --- */
        .links-container {
            width: 90%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 1.5vh; 
            z-index: 2;
        }

        .link-btn {
            position: relative;
            display: block;
            width: 100%;
            padding: 16px;
            background-color: rgba(5, 5, 10, 0.65); 
            color: #ffffff;
            text-decoration: none;
            text-align: center;
            border: 2px solid rgba(0, 119, 255, 0.4); 
            border-radius: 30px;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.15s ease; 
            backdrop-filter: blur(2px);
            overflow: hidden; /* Necesario para el efecto de luz interior */
        }

        /* Capa de luz que sigue al cursor/dedo */
        .link-btn::before {
            content: '';
            position: absolute;
            top: var(--y, -100px);
            left: var(--x, -100px);
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(0, 119, 255, 0.3) 0%, transparent 60%);
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        @media (hover: hover) {
            .link-btn:hover {
                border-color: #0077ff;
                box-shadow: 0 0 15px rgba(0, 119, 255, 0.6);
            }
            .link-btn:hover::before { opacity: 1; }
        }

        .link-btn:active, .link-btn.clicked {
            transform: scale(0.92); 
            border-color: #ffffff; 
            box-shadow: 0 0 25px rgba(255, 255, 255, 1), inset 0 0 10px rgba(255, 255, 255, 0.6); 
            background-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            text-shadow: 0 0 8px #ffffff;
        }
        .link-btn:active::before { opacity: 1; background: radial-gradient(circle, rgba(255, 255, 255, 0.4) 0%, transparent 60%); }
    </style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">

    <div class="water-bg">
        <canvas id="canvas"></canvas>
        <div class="symbols-layer">
            <div class="sym" style="top: 20%; left: 30%;">⛧</div>
            <div class="sym" style="top: 60%; left: 80%;">👁</div>
            <div class="sym" style="top: 85%; left: 40%;">☥</div>
            <div class="sym" style="top: 30%; left: 70%;">⛤</div>
            <div class="sym" style="top: 75%; left: 15%;">☾</div>
            <div class="sym" style="top: 15%; left: 85%;">⛧</div>
            <div class="sym" style="top: 45%; left: 10%;">👁</div>
        </div>
        <div class="symbols-layer reverse">
            <div class="sym" style="top: 25%; left: 15%;">☥</div>
            <div class="sym" style="top: 70%; left: 60%;">⛤</div>
            <div class="sym" style="top: 40%; left: 85%;">⛧</div>
            <div class="sym" style="top: 85%; left: 85%;">👁</div>
            <div class="sym" style="top: 10%; left: 50%;">☾</div>
            <div class="sym" style="top: 50%; left: 30%;">⛧</div>
        </div>
    </div>

    <div class="profile-container">
        <img src="perfil.png" alt="BRX'" class="profile-pic">
    </div>

    <h1 id="title">BRX'</h1>

    <div class="links-container">
        <a href="https://discord.gg/NzsUagAc" class="link-btn">Discord</a>
        <a href="https://wa.me/5214433799879" class="link-btn">WhatsApp</a>
        <a href="https://t.me/utileria" class="link-btn">Telegram</a>
        <a href="https://www.instagram.com/brx057?igsh=aWEwOGE5dHdpbDd4" class="link-btn">Instagram</a>
        <a href="https://tiktok.com/@brx_057" class="link-btn">TikTok</a>
    </div>

    <script>
        /* 1. SCRIPT DE RETARDO DE ANIMACIÓN Y HOVER DE LUZ PARA BOTONES */
        document.querySelectorAll('.link-btn').forEach(button => {
            // Efecto de luz siguiendo el dedo/cursor
            button.addEventListener('mousemove', e => {
                const rect = button.getBoundingClientRect();
                button.style.setProperty('--x', (e.clientX - rect.left) + 'px');
                button.style.setProperty('--y', (e.clientY - rect.top) + 'px');
            });
            // Soporte para touch en móviles para la luz
            button.addEventListener('touchmove', e => {
                const rect = button.getBoundingClientRect();
                const touch = e.touches[0];
                button.style.setProperty('--x', (touch.clientX - rect.left) + 'px');
                button.style.setProperty('--y', (touch.clientY - rect.top) + 'px');
            }, {passive: true});

            // Animación de clic con retardo
            button.addEventListener('click', function(e) {
                e.preventDefault();
                const url = this.getAttribute('href');
                this.classList.add('clicked');
                setTimeout(() => {
                    this.classList.remove('clicked');
                    window.open(url, '_blank', 'noopener,noreferrer');
                }, 250); 
            });
        });

        /* 2. SCRIPT DE PARTÍCULAS INTERACTIVAS (CENIZAS/BURBUJAS) */
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray = [];
        let mouse = { x: null, y: null };

        // Rastreador de posición
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });
        window.addEventListener('touchmove', (e) => {
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        }, {passive: true});
        window.addEventListener('touchend', () => {
            mouse.x = null;
            mouse.y = null;
        });

        // Clase Partícula
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5; // Tamaño pequeño
                this.speedY = Math.random() * -1.5 - 0.5; // Flotan hacia arriba
                this.speedX = (Math.random() - 0.5) * 1;
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;

                // Efecto de evasión si pasas el dedo cerca
                if (mouse.x != null) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 70) { // Radio de colisión
                        this.x -= dx / 15;
                        this.y -= dy / 15;
                    }
                }

                // Reiniciar si salen de la pantalla
                if (this.y < 0) {
                    this.y = canvas.height;
                    this.x = Math.random() * canvas.width;
                }
                if (this.x < 0 || this.x > canvas.width) {
                    this.speedX = -this.speedX;
                }
            }
            draw() {
                ctx.fillStyle = 'rgba(0, 119, 255, 0.4)'; // Azul brillante transparente
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Crear array de partículas
        function init() {
            particlesArray = [];
            let numberOfParticles = (canvas.width * canvas.height) / 8000; // Cantidad adaptativa
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        // Ciclo de animación
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animate);
        }

        // Ajustar tamaño si se rota la pantalla
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });

        init();
        animate();
    </script>
</body>
