<html lang="es">
<head>
    <meta charset="UTF-8">

    <meta name="theme-color" content="#020205">

    <style>
        /* --- SEGURIDAD Y RESETEO --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            background-color: #020205; 
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        /* --- FONDO PROFUNDO SUBMARINO --- */
        .water-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            background: radial-gradient(circle at center, rgba(0, 90, 200, 0.15) 0%, #020205 70%);
        }

        /* --- SÍMBOLOS GIRANDO EN EL AGUA --- */
        .symbols-layer {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            animation: rotateWave 40s linear infinite;
            pointer-events: none;
        }

        .symbols-layer.reverse {
            animation: rotateWave 30s linear infinite reverse;
        }

        .sym {
            position: absolute;
            color: rgba(0, 119, 255, 0.25);
            font-size: 24px;
            text-shadow: 0 0 12px rgba(0, 119, 255, 0.9);
            animation: pulseSym 4s infinite alternate;
        }

        @keyframes rotateWave {
            0% { transform: translateX(-50%) rotate(0deg); }
            100% { transform: translateX(-50%) rotate(360deg); }
        }

        @keyframes pulseSym {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* --- CONTENEDOR DE PERFIL --- */
        .profile-container {
            position: relative;
            margin-bottom: 2vh; 
            display: flex;
            justify-content: center;
            align-items: center;
            width: 140px;
            height: 140px;
            z-index: 1;
        }

        .profile-container::before,
        .profile-container::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(0, 119, 255, 0.8);
            border-radius: 50%;
            z-index: 0;
            box-shadow: 0 0 15px rgba(0, 119, 255, 0.5);
        }

        .profile-container::before {
            animation: expandRing 3s infinite ease-out;
        }

        .profile-container::after {
            animation: expandRing 3s infinite ease-out 1.5s; 
        }

        @keyframes expandRing {
            0% { width: 120px; height: 120px; opacity: 1; border-width: 3px; }
            100% { width: 220px; height: 220px; opacity: 0; border-width: 1px; }
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            z-index: 2; 
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 0 25px rgba(0, 119, 255, 0.8);
            background-color: #000;
            pointer-events: none; 
        }

        h1 {
            font-family: 'Georgia', serif;
            font-size: 26px;
            letter-spacing: 4px;
            margin-bottom: 4vh; 
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(0, 119, 255, 0.9);
            z-index: 1;
        }

        /* --- BOTONES --- */
        .links-container {
            width: 90%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 1.5vh; 
            z-index: 1;
        }

        .link-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background-color: rgba(5, 5, 10, 0.65); 
            color: #ffffff;
            text-decoration: none;
            text-align: center;
            border: 2px solid rgba(0, 119, 255, 0.4); 
            border-radius: 30px;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.15s ease; 
            backdrop-filter: blur(2px);
        }

        /* El estado :active clásico se complementa con la clase .clicked de JavaScript */
        .link-btn:active, .link-btn.clicked {
            transform: scale(0.92); 
            border-color: #ffffff; 
            box-shadow: 0 0 25px rgba(255, 255, 255, 1), inset 0 0 10px rgba(255, 255, 255, 0.6); 
            background-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            text-shadow: 0 0 8px #ffffff;
        }

        @media (hover: hover) {
            .link-btn:hover {
                border-color: #0077ff;
                box-shadow: 0 0 15px rgba(0, 119, 255, 0.6);
            }
        }
    </style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">

    <div class="water-bg">
        
        <div class="symbols-layer">
            <div class="sym" style="top: 20%; left: 30%;">⛧</div>
            <div class="sym" style="top: 60%; left: 80%;">👁</div>
            <div class="sym" style="top: 85%; left: 40%;">☥</div>
            <div class="sym" style="top: 30%; left: 70%;">⛤</div>
            <div class="sym" style="top: 75%; left: 15%;">☾</div>
            <div class="sym" style="top: 15%; left: 85%;">⛧</div>
            <div class="sym" style="top: 45%; left: 10%;">👁</div>
        </div>

        <div class="symbols-layer reverse">
            <div class="sym" style="top: 25%; left: 15%;">☥</div>
            <div class="sym" style="top: 70%; left: 60%;">⛤</div>
            <div class="sym" style="top: 40%; left: 85%;">⛧</div>
            <div class="sym" style="top: 85%; left: 85%;">👁</div>
            <div class="sym" style="top: 10%; left: 50%;">☾</div>
            <div class="sym" style="top: 50%; left: 30%;">⛧</div>
        </div>
    </div>

    <div class="profile-container">
        <img src="perfil.png" alt="BRX'" class="profile-pic">
    </div>

    <h1>BRX'</h1>

    <div class="links-container">
        <a href="https://discord.gg/NzsUagAc" class="link-btn">Discord</a>
        <a href="https://wa.me/5214433799879" class="link-btn">WhatsApp</a>
        <a href="https://t.me/utileria" class="link-btn">Telegram</a>
        <a href="https://www.instagram.com/brx057?igsh=aWEwOGE5dHdpbDd4" class="link-btn">Instagram</a>
        <a href="https://tiktok.com/@brx_057" class="link-btn">TikTok</a>
    </div>

    <!-- SCRIPT DE RETARDO DE ANIMACIÓN SÚPER FLUIDO -->
    <script>
        document.querySelectorAll('.link-btn').forEach(button => {
            button.addEventListener('click', function(e) {
                // Detener apertura instantánea del enlace
                e.preventDefault();
                
                const url = this.getAttribute('href');
                
                // Forzar el estilo de animación activa
                this.classList.add('clicked');
                
                // Esperar exactamente 250ms antes de ejecutar la acción
                setTimeout(() => {
                    // Quitamos la clase para que el botón vuelva a su tamaño normal suavemente
                    this.classList.remove('clicked');
                    
                    // Abrimos el link en una pestaña nueva de forma segura
                    window.open(url, '_blank', 'noopener,noreferrer');
                }, 250); 
            });
        });
    </script>

</body>
</html>
