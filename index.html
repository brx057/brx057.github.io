<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BRX' - Enlaces</title>
    <style>
        /* --- SEGURIDAD Y RESETEO --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            background-color: #020205; /* Fondo un poco más oscuro para que resalte el neón */
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        /* --- ANIMACIÓN DE OLAS Y SÍMBOLOS AL FONDO --- */
        .wave-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }
        
        /* Olas más visibles con degradado y sombra interior */
        .wave {
            position: absolute;
            bottom: -15%;
            left: 50%;
            width: 250vw;
            height: 250vw;
            background: radial-gradient(circle at center, rgba(0,119,255,0.02) 0%, rgba(0,119,255,0.18) 100%);
            box-shadow: inset 0 0 50px rgba(0, 119, 255, 0.4);
            border-radius: 40% 45% 55% 45%;
            transform: translateX(-50%);
            animation: rotateWave 12s linear infinite;
        }
        
        .wave:nth-child(2) {
            bottom: -20%;
            background: radial-gradient(circle at center, rgba(0,119,255,0.01) 0%, rgba(0,119,255,0.12) 100%);
            border-radius: 45% 40% 45% 55%;
            animation: rotateWave 18s linear infinite reverse; 
        }

        /* Capas de símbolos esparcidos */
        .symbols-layer {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            animation: rotateWave 40s linear infinite;
            pointer-events: none;
        }

        .symbols-layer.reverse {
            animation: rotateWave 30s linear infinite reverse;
        }

        .sym {
            position: absolute;
            color: rgba(0, 119, 255, 0.3);
            font-size: 24px;
            text-shadow: 0 0 10px rgba(0, 119, 255, 0.8);
            animation: pulseSym 4s infinite alternate;
        }

        @keyframes rotateWave {
            0% { transform: translateX(-50%) rotate(0deg); }
            100% { transform: translateX(-50%) rotate(360deg); }
        }

        @keyframes pulseSym {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* --- CONTENEDOR DE PERFIL (EFECTO EXPANSIÓN) --- */
        .profile-container {
            position: relative;
            margin-bottom: 2vh; 
            display: flex;
            justify-content: center;
            align-items: center;
            width: 140px;
            height: 140px;
            z-index: 1;
        }

        /* Anillos que se expanden hacia afuera */
        .profile-container::before,
        .profile-container::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(0, 119, 255, 0.8);
            border-radius: 50%;
            z-index: 0;
            box-shadow: 0 0 15px rgba(0, 119, 255, 0.5);
        }

        .profile-container::before {
            animation: expandRing 3s infinite ease-out;
        }

        .profile-container::after {
            animation: expandRing 3s infinite ease-out 1.5s; /* Empieza 1.5s después para hacer eco */
        }

        @keyframes expandRing {
            0% { width: 120px; height: 120px; opacity: 1; border-width: 3px; }
            100% { width: 220px; height: 220px; opacity: 0; border-width: 1px; }
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            z-index: 2; /* Por encima de los anillos */
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 0 25px rgba(0, 119, 255, 0.8);
            background-color: #000;
            pointer-events: none; 
        }

        h1 {
            font-family: 'Georgia', serif;
            font-size: 26px;
            letter-spacing: 4px;
            margin-bottom: 4vh; 
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(0, 119, 255, 0.9);
            z-index: 1;
        }

        /* --- BOTONES --- */
        .links-container {
            width: 90%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 1.5vh; 
            z-index: 1;
        }

        .link-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background-color: rgba(5, 5, 10, 0.65); 
            color: #ffffff;
            text-decoration: none;
            text-align: center;
            border: 2px solid rgba(0, 119, 255, 0.4); 
            border-radius: 30px;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.15s ease; 
            backdrop-filter: blur(2px);
        }

        .link-btn:active {
            transform: scale(0.92); 
            border-color: #ffffff; 
            box-shadow: 0 0 25px rgba(255, 255, 255, 1), inset 0 0 10px rgba(255, 255, 255, 0.6); 
            background-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            text-shadow: 0 0 8px #ffffff;
        }

        @media (hover: hover) {
            .link-btn:hover {
                border-color: #0077ff;
                box-shadow: 0 0 15px rgba(0, 119, 255, 0.6);
            }
        }
    </style>
</head>
