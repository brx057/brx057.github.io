<style>
  :root{
    --bg:#0a0908;
    --ink:#efe9e4;
    --ink-dim:#8d7e79;
    --card:#131010;
    --line:rgba(179,16,31,0.20);
    --blood:#7a0c16;
    --blood-bright:#c11424;
    --blood-deep:#350307;
  }

  *{box-sizing:border-box;}
  html,body{
    margin:0;
    padding:0;
    height:100%;
    overflow:hidden;
    overscroll-behavior:none;
    touch-action:none;
  }

  body{
    height:100svh;
    background:
      radial-gradient(circle at 50% -10%, rgba(122,12,22,0.28), transparent 55%),
      radial-gradient(circle at 50% 110%, rgba(53,3,7,0.45), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:'Jost', sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:14px 20px;
    -webkit-user-select:none;
    user-select:none;
    -webkit-touch-callout:none;
  }

  .page{
    position:relative;
    z-index:1;
    width:100%;
    max-width:420px;
    display:flex;
    flex-direction:column;
    align-items:center;
    transform-origin:center center;
  }

  /* ---------- floating symbols ---------- */
  .symbols-field{
    position:fixed;
    inset:0;
    z-index:0;
    overflow:hidden;
    pointer-events:none;
  }
  .floating-symbol{
    position:absolute;
    color:rgba(193,20,36,0.42);
    text-shadow:0 0 14px rgba(193,20,36,0.45);
    user-select:none;
    opacity:0;
    animation-name:symbol-float;
    animation-timing-function:ease-in-out;
    animation-fill-mode:forwards;
  }
  .floating-symbol.alt{
    color:rgba(239,233,228,0.22);
    text-shadow:0 0 12px rgba(239,233,228,0.25);
  }
  @keyframes symbol-float{
    0%{ opacity:0; transform:translateY(12px) scale(0.8) rotate(-4deg); }
    14%{ opacity:.6; }
    50%{ opacity:.4; transform:translateY(-12px) scale(1) rotate(2deg); }
    86%{ opacity:.4; }
    100%{ opacity:0; transform:translateY(-32px) scale(1.05) rotate(-2deg); }
  }

  /* ---------- avatar ---------- */
  .avatar-wrap{
    position:relative;
    width:168px;
    height:168px;
    margin-bottom:28px;
  }
  .avatar-wrap::before,
  .avatar-wrap::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:50%;
    border:1.5px solid var(--blood-bright);
    animation:pulse-ring 2.8s cubic-bezier(.4,0,.6,1) infinite;
  }
  .avatar-wrap::after{ animation-delay:.45s; }
  @keyframes pulse-ring{
    0%{ transform:scale(1); opacity:.6; }
    100%{ transform:scale(1.38); opacity:0; }
  }
  .avatar{
    position:absolute;
    inset:0;
    border-radius:50%;
    overflow:hidden;
    border:1px solid rgba(239,233,228,0.12);
    box-shadow:
      0 0 0 6px var(--bg),
      0 0 40px rgba(122,12,22,0.55),
      inset 0 0 30px rgba(0,0,0,0.6);
  }
  .avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    filter:contrast(1.08) saturate(0.9);
  }
  .avatar::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:50%;
    background:radial-gradient(circle closest-side at center, transparent 56%, rgba(10,9,8,0.65) 84%, rgba(10,9,8,0.98) 100%);
    pointer-events:none;
  }

  /* ---------- identity ---------- */
  .name{
    font-family:'Cinzel', serif;
    font-weight:700;
    font-size:30px;
    letter-spacing:0.04em;
    margin:0 0 38px;
    color:var(--ink);
    text-shadow:0 0 18px rgba(193,20,36,0.35);
  }

  /* ---------- links ---------- */
  .links{
    width:100%;
    display:flex;
    flex-direction:column;
    gap:13px;
  }
  .link-card{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:18px 26px;
    background:linear-gradient(180deg, var(--card), #0e0c0c);
    border:1px solid var(--line);
    border-radius:999px;
    text-decoration:none;
    color:var(--ink);
    overflow:hidden;
    opacity:0;
    transform:translateY(14px) scale(0.96);
    animation:rise .7s cubic-bezier(.16,1,.3,1) forwards, breathe 4.5s ease-in-out infinite;
    transition:transform .35s cubic-bezier(.22,1,.36,1), border-color .3s ease, background .3s ease, box-shadow .35s cubic-bezier(.22,1,.36,1);
    -webkit-tap-highlight-color:transparent;
    will-change:transform;
  }
  .link-card:hover{
    border-color:rgba(193,20,36,0.5);
    background:linear-gradient(180deg, #181313, #0e0c0c);
    transform:translateY(-2px);
  }
  .link-card.is-active{
    transform:scale(0.97);
    border-color:var(--blood-bright);
    box-shadow:
      0 0 4px 1px rgba(217,24,40,0.95),
      0 0 14px 2px rgba(193,20,36,0.7),
      0 0 30px 5px rgba(193,20,36,0.4),
      inset 0 0 10px 1px rgba(193,20,36,0.55);
    transition:transform .12s cubic-bezier(.22,1,.36,1), border-color .12s ease, box-shadow .12s ease;
  }
  @keyframes breathe{
    0%,100%{ box-shadow:0 0 0 rgba(193,20,36,0); }
    50%{ box-shadow:0 0 18px rgba(193,20,36,0.14); }
  }

  .link-label{
    position:relative;
    z-index:1;
    font-weight:500;
    font-size:14.5px;
    letter-spacing:0.09em;
    text-transform:uppercase;
    text-align:center;
    transition:color .2s ease;
  }
  .link-card:hover .link-label,
  .link-card.is-active .link-label{ color:#fff; }

  .links a:nth-child(1){ animation-delay:.05s; }
  .links a:nth-child(2){ animation-delay:.12s; }
  .links a:nth-child(3){ animation-delay:.19s; }
  .links a:nth-child(4){ animation-delay:.26s; }
  .links a:nth-child(5){ animation-delay:.33s; }
  .links a:nth-child(6){ animation-delay:.40s; }

  @keyframes rise{
    to{ opacity:1; transform:translateY(0); }
  }

  /* ---------- action row (audio + share) ---------- */
  .action-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:18px;
    margin-top:38px;
  }

  .audio-btn,
  .share-btn{
    position:relative;
    width:60px;
    height:60px;
    border-radius:50%;
    border:1.5px solid rgba(193,20,36,0.6);
    background:linear-gradient(180deg, var(--card), #0e0c0c);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    padding:0;
    -webkit-tap-highlight-color:transparent;
    box-shadow:0 0 14px rgba(193,20,36,0.3);
    transition:transform .2s cubic-bezier(.22,1,.36,1), box-shadow .3s ease, border-color .3s ease;
  }
  .audio-btn.is-active,
  .share-btn.is-active{ transform:scale(0.92); }
  .share-btn svg{
    width:20px;
    height:20px;
    color:var(--ink);
    transition:color .2s ease;
  }
  .share-btn.is-active{
    border-color:var(--blood-bright);
    box-shadow:0 0 22px rgba(193,20,36,0.5);
  }
  .share-btn.is-active svg{ color:var(--blood-bright); }
  .audio-btn::before,
  .audio-btn::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:50%;
    border:1.5px solid var(--blood-bright);
    opacity:0;
  }
  .audio-btn.playing{
    border-color:var(--blood-bright);
    box-shadow:0 0 22px rgba(193,20,36,0.55);
  }
  .audio-btn.playing::before,
  .audio-btn.playing::after{
    animation:pulse-ring 2.2s cubic-bezier(.4,0,.6,1) infinite;
  }
  .audio-btn.playing::after{ animation-delay:.4s; }
  .audio-btn svg{
    position:relative;
    z-index:1;
    width:20px;
    height:20px;
    color:var(--ink);
    transition:color .2s ease;
  }
  .audio-btn.playing svg{ color:var(--blood-bright); }
  .audio-btn .icon-pause{ display:none; }
  .audio-btn.playing .icon-play{ display:none; }
  .audio-btn.playing .icon-pause{ display:block; }

  @media (prefers-reduced-motion: reduce){
    .avatar-wrap::before,.avatar-wrap::after,.link-card,.audio-btn::before,.audio-btn::after{
      animation:none !important;
      opacity:1 !important;
      transform:none !important;
    }
    .symbols-field{ display:none; }
  }

  a:focus-visible, .link-card:focus-visible{
    outline:2px solid var(--blood-bright);
    outline-offset:3px;
  }

  .toast{
    position:fixed;
    left:50%;
    bottom:36px;
    transform:translate(-50%, 12px);
    z-index:5;
    padding:11px 20px;
    background:linear-gradient(180deg, #161112, #0e0c0c);
    border:1px solid rgba(193,20,36,0.55);
    border-radius:999px;
    color:var(--ink);
    font-size:13px;
    letter-spacing:0.03em;
    box-shadow:0 0 20px rgba(193,20,36,0.4);
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease, transform .25s ease;
  }
  .toast.show{
    opacity:1;
    transform:translate(-50%, 0);
  }
</style>

      audioBtn.addEventListener('pointerdown', function(){
        audioBtn.classList.add('is-active');
        if(navigator.vibrate) navigator.vibrate(10);
      });
      ['pointerup','pointerleave','pointercancel'].forEach(function(ev){
        audioBtn.addEventListener(ev, function(){ audioBtn.classList.remove('is-active'); });
      });
      audioBtn.addEventListener('click', function(){
        if(audio.paused){
          audio.play();
          audioBtn.classList.add('playing');
        } else {
          audio.pause();
          audioBtn.classList.remove('playing');
        }
      });
      audio.addEventListener('ended', function(){ audioBtn.classList.remove('playing'); });
    }

    // share button
    var shareBtn = document.getElementById('shareBtn');
    if(shareBtn){
      shareBtn.addEventListener('pointerdown', function(){
        shareBtn.classList.add('is-active');
        if(navigator.vibrate) navigator.vibrate(10);
      });
      ['pointerup','pointerleave','pointercancel'].forEach(function(ev){
        shareBtn.addEventListener(ev, function(){ shareBtn.classList.remove('is-active'); });
      });
      shareBtn.addEventListener('click', function(){
        var shareData = {
          title: "brx'",
          text: 'todas mis redes en un mismo lugar',
          url: 'https://brx057.github.io/'
        };
        if(navigator.share){
          navigator.share(shareData).catch(function(){});
        } else if(navigator.clipboard){
          navigator.clipboard.writeText(shareData.url).then(function(){
            showToast('Link copiado: ' + shareData.url);
          }).catch(function(){});
        }
      });
    }

    // floating mystical symbols ✡︎ 🪬 𓁹
    var field = document.getElementById('symbolsField');
    var glyphs = ['✡︎', '🪬', '𓁹'];
    var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    if (field && !reduceMotion) {
      var maxAlive = 22;
      setInterval(function(){
        if (field.childElementCount >= maxAlive) return;
        var el = document.createElement('span');
        el.className = 'floating-symbol' + (Math.random() < 0.3 ? ' alt' : '');
        el.textContent = glyphs[Math.floor(Math.random() * glyphs.length)];
        el.style.left = (Math.random() * 88 + 4) + 'vw';
        el.style.top = (Math.random() * 84 + 6) + 'vh';
        var dur = 5 + Math.random() * 4;
        el.style.animationDuration = dur + 's';
        el.style.fontSize = (16 + Math.random() * 16) + 'px';
        field.appendChild(el);
        setTimeout(function(){ el.remove(); }, dur * 1000 + 150);
      }, 350);
    }
  })();
  </script>
</body>
</html>
