<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Evita que el usuario pueda hacer zoom -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BRX' - Enlaces</title>
    <style>
        /* --- SEGURIDAD Y RESETEO --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* Bloquea la selección de texto y el menú de mantener presionado en móviles */
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            /* Quita el cuadro azul que aparece al tocar botones en Android */
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            background-color: #030308;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Centra todo perfectamente */
            height: 100vh; /* Ocupa exactamente el alto de la pantalla */
            width: 100vw; /* Ocupa exactamente el ancho de la pantalla */
            overflow: hidden; /* BLOQUEA EL DESLIZAMIENTO */
            position: relative;
        }

        /* --- ANIMACIÓN DE OLAS DE AGUA AL FONDO --- */
        .wave-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            background: radial-gradient(circle at center, #050a15 0%, #030308 100%);
        }
        
        .wave {
            position: absolute;
            bottom: -15%;
            left: 50%;
            width: 250vw;
            height: 250vw;
            background: rgba(0, 119, 255, 0.04);
            border-radius: 40% 45% 55% 45%;
            transform: translateX(-50%);
            animation: rotateWave 12s linear infinite;
        }
        
        .wave:nth-child(2) {
            bottom: -20%;
            background: rgba(0, 119, 255, 0.06);
            border-radius: 45% 40% 45% 55%;
            animation: rotateWave 18s linear infinite reverse; /* Gira al lado contrario */
        }

        @keyframes rotateWave {
            0% { transform: translateX(-50%) rotate(0deg); }
            100% { transform: translateX(-50%) rotate(360deg); }
        }

        /* --- CONTENEDOR DE PERFIL --- */
        .profile-container {
            position: relative;
            margin-bottom: 2vh; 
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        /* Anillos más marcados */
        .profile-container::before {
            content: '';
            position: absolute;
            width: 160px;
            height: 160px;
            border: 3px solid rgba(0, 119, 255, 0.3);
            border-radius: 50%;
            z-index: 0;
        }

        .profile-container::after {
            content: '';
            position: absolute;
            width: 145px;
            height: 145px;
            border: 2px solid rgba(0, 119, 255, 0.7);
            border-radius: 50%;
            z-index: 0;
            box-shadow: 0 0 25px rgba(0, 119, 255, 0.4);
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            z-index: 1;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 0 20px rgba(0, 119, 255, 0.6);
            background-color: #000;
            pointer-events: none; /* Bloquea interacciones con la imagen */
        }

        h1 {
            font-family: 'Georgia', serif;
            font-size: 26px;
            letter-spacing: 4px;
            margin-bottom: 4vh; 
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(0, 119, 255, 0.9);
            z-index: 1;
        }

        /* --- BOTONES --- */
        .links-container {
            width: 90%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 1.5vh; 
            z-index: 1;
        }

        .link-btn {
            display: block;
            width: 100%;
            padding: 16px;
            /* Fondo semi-transparente para ver las olas pasar */
            background-color: rgba(8, 8, 12, 0.6); 
            color: #ffffff;
            text-decoration: none;
            text-align: center;
            border: 2px solid rgba(0, 119, 255, 0.4); /* Bordes marcados */
            border-radius: 30px;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.15s ease; /* Transición súper rápida para el toque */
            backdrop-filter: blur(2px);
        }

        /* EFECTO DE TOQUE: Hundimiento y Brillo Blanco Neón */
        .link-btn:active {
            transform: scale(0.92); /* El botón se hace más pequeño como si se presionara */
            border-color: #ffffff; /* Borde blanco */
            /* Resplandor blanco neón hacia afuera y hacia adentro */
            box-shadow: 0 0 25px rgba(255, 255, 255, 1), inset 0 0 10px rgba(255, 255, 255, 0.6); 
            background-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            text-shadow: 0 0 8px #ffffff;
        }

        /* Efecto Hover para PC (opcional, por si alguien lo ve en compu) */
        @media (hover: hover) {
            .link-btn:hover {
                border-color: #0077ff;
                box-shadow: 0 0 15px rgba(0, 119, 255, 0.6);
            }
        }
    </style>
</head>
<!-- Bloqueos de seguridad directamente en la etiqueta body -->
<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">

    <!-- Fondo Animado de Olas -->
    <div class="wave-bg">
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <!-- Contenedor del Perfil -->
    <div class="profile-container">
        <img src="perfil.png" alt="BRX'" class="profile-pic">
    </div>

    <h1>BRX'</h1>

    <!-- Contenedor de Botones (Ordenados según pediste) -->
    <div class="links-container">
        <a href="https://discord.gg/NzsUagAc" class="link-btn" target="_blank" rel="noopener noreferrer">Discord</a>
        <a href="https://wa.me/5214433799879" class="link-btn" target="_blank" rel="noopener noreferrer">WhatsApp</a>
        <a href="https://t.me/utileria" class="link-btn" target="_blank" rel="noopener noreferrer">Telegram</a>
        <a href="https://www.instagram.com/brx057?igsh=aWEwOGE5dHdpbDd4" class="link-btn" target="_blank" rel="noopener noreferrer">Instagram</a>
        <a href="https://tiktok.com/@brx_057" class="link-btn" target="_blank" rel="noopener noreferrer">TikTok</a>
    </div>

</body>
</html>
