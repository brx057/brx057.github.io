<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRX' - Enlaces</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            /* Fondo oscuro con un tono muy sutil de azul */
            background-color: #030308; 
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 60px 20px;
        }
        
        /* Contenedor de la imagen con el efecto de anillos azules */
        .profile-container {
            position: relative;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* Anillo exterior */
        .profile-container::before {
            content: '';
            position: absolute;
            width: 170px;
            height: 170px;
            border: 1px solid rgba(0, 119, 255, 0.2);
            border-radius: 50%;
            z-index: 0;
        }
        
        /* Anillo intermedio */
        .profile-container::after {
            content: '';
            position: absolute;
            width: 155px;
            height: 155px;
            border: 1px solid rgba(0, 119, 255, 0.4);
            border-radius: 50%;
            z-index: 0;
            box-shadow: 0 0 15px rgba(0, 119, 255, 0.2);
        }

        .profile-pic {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            z-index: 1;
            /* Brillo interior del círculo de la foto */
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 0 20px rgba(0, 119, 255, 0.3);
            background-color: #000;
        }

        h1 {
            font-family: 'Georgia', serif;
            font-size: 26px;
            letter-spacing: 3px;
            margin-bottom: 40px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 119, 255, 0.5);
        }

        .links-container {
            width: 100%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Estilo de los botones */
        .link-btn {
            display: block;
            width: 100%;
            padding: 18px;
            background-color: #08080c;
            color: #ffffff;
            text-decoration: none;
            text-align: center;
            border: 1px solid rgba(0, 119, 255, 0.15);
            border-radius: 30px;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        /* Efecto al tocar/pasar el cursor sobre el botón */
        .link-btn:hover, .link-btn:active {
            border-color: #0077ff;
            box-shadow: 0 0 15px rgba(0, 119, 255, 0.4);
            background-color: #0a0f1a;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <img src="perfil.png" alt="BRX'" class="profile-pic">
    </div>

    <h1>BRX'</h1>

    <div class="links-container">
        <a href="https://discord.gg/NzsUagAc" class="link-btn" target="_blank">WhatsApp</a>
        <a href="https://t.me/utileria" class="link-btn" target="_blank">Telegram</a>
        <a href="https://www.instagram.com/brx057?igsh=aWEwOGE5dHdpbDd4" class="link-btn" target="_blank">Instagram</a>
        <a href="https://discord.gg/NzsUagAc" class="link-btn" target="_blank">Discord</a>
        <a href="https://tiktok.com/@brx_057" class="link-btn" target="_blank">TikTok</a>
    </div>

</body>
</html>
